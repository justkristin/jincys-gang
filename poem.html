<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Gang Poetry</title>
  <link rel="icon" href="https://hyde.flaneurpajamas.com/commonplaces/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/syllables.js"></script>
  <script src="js/rhyme.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <header>
    <div class="container">
      <div class="header-inner">
        <img class="header-favicon" ...>
        <div class="header-text">
          <h1><a href="index.html">Gang Poetry</a></h1>
          <p class="tagline">A collaborative poetry experiment</p>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="mypoems.html">My Poems</a>
          <a href="browse.html">Completed</a>
          <a href="public.html">Join a Gang</a>
          <a href="glossary.html">Glossary</a>
          <a href="faq.html">FAQ</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- Loading -->
    <template x-if="loading">
      <p>Loading poem...</p>
    </template>

    <!-- Error -->
    <template x-if="error">
      <div class="panel">
        <p x-text="error"></p>
        <p><a href="index.html">← Back to home</a></p>
      </div>
    </template>

    <!-- Already contributed last line -->
    <template x-if="!loading && !error && justContributed">
      <div class="panel" style="text-align: center; padding: 2rem;">
        <h2>Line saved!</h2>
        <p>You just contributed line <span x-text="justContributedLine"></span>. 
           Come back when someone else has added the next line!</p>
        <p style="margin-top: 1rem;">
          <strong>Share this URL so someone can continue:</strong>
        </p>
        <div class="share-url" x-text="window.location.href"></div>
        <button class="btn-secondary" style="margin-top: 1rem;"
          @click="copyUrl()">
          Copy URL
        </button>
        <p style="margin-top: 1.5rem;">
          <a href="index.html">← Back to home</a>
        </p>
      </div>
    </template>

    <!-- Can't contribute - same person as last contributor -->
    <template x-if="!loading && !error && !justContributed && isLastContributor">
      <div class="panel" style="text-align: center; padding: 2rem;">
        <h2>You just contributed!</h2>
        <p>You wrote the last line. Share this URL and come back 
           when someone else has continued the poem.</p>
        <div class="share-url" x-text="window.location.href"></div>
        <button class="btn-secondary" style="margin-top: 1rem;"
          @click="copyUrl()">
          Copy URL
        </button>
        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--color-text-light);">
          Last contributed: <span x-text="lastContributedAt"></span>
        </p>
        <p style="margin-top: 1rem;">
          <a href="index.html">← Back to home</a>
        </p>
      </div>
    </template>

    <!-- Poem complete - revealed! -->
    <template x-if="!loading && !error && poem && poem.status === 'complete'">
      <div class="poem-complete">
        <h2 x-text="poem.title"></h2>
          <p class="tagline">
            <span x-text="formDisplayName"></span>
            &nbsp; · &nbsp;
            <a :href="glossaryUrl(formDisplayName)"
               style="font-size: 0.85rem; color: var(--color-text-light);">
              about this form →
            </a>
          </p>
        <div class="revealed-poem">
          <template x-for="(stanza, si) in stanzas" :key="si">
            <div class="stanza">
              <template x-for="line in stanza" :key="line.line_number">
                <p x-text="line.content"></p>
              </template>
            </div>
          </template>
        </div>

        <!-- Action bar -->
        <div class="poem-actions">
          
          <!-- Like button -->
          <button
            class="action-btn like-btn"
            :class="{ liked: userHasLiked }"
            @click="toggleLike()">
            <span x-text="userHasLiked ? '♥' : '♡'"></span>
            <span x-text="likeCount"></span>
          </button>
        
          <!-- Share button -->
          <button
            class="action-btn share-btn"
            @click="sharePoem()">
            ↗ Share
          </button>
        
          <!-- Report button -->
          <template x-if="!userHasReported">
                    <button
              class="action-btn report-btn"
              @click="showReportForm = !showReportForm">
              ⚑ Report
            </button>
          </template>
                  <template x-if="userHasReported">
            <span class="action-btn report-btn reported">✓ Reported</span>
          </template>
        
        </div>
                
        <!-- Report form -->
        <div x-show="showReportForm" class="report-form" x-transition>
          <p style="font-size: 0.85rem; color: var(--color-text-light); margin-bottom: 0.5rem;">
            Why are you reporting this poem? (optional)
          </p>
          <textarea
            class="report-textarea"
            x-model="reportReason"
            placeholder="Tell us what concerns you about this poem..."
            rows="3">
          </textarea>
          <div style="display: flex; gap: 0.75rem; margin-top: 0.75rem;">
            <button class="btn-primary" @click="submitReport()"
              style="font-size: 0.85rem; padding: 0.5rem 1rem;">
              Submit report
            </button>
            <button class="btn-secondary" @click="showReportForm = false"
              style="font-size: 0.85rem; padding: 0.5rem 1rem;">
              Cancel
            </button>
          </div>
        </div>
        
        <hr class="panel-divider">
        <p><a href="browse.html">Browse more completed poems →</a></p>
        <p><a href="index.html">← Back to home</a></p>
      </div>
    </template>

    <!-- Race condition warning -->
    <template x-if="raceConditionWarning">
      <div class="panel panel-warning" style="margin-bottom: 1.5rem;">
        <p>Someone else just contributed that line while you were writing! 
           The poem has moved on — please check the updated hint below and try again.</p>
      </div>
    </template>

    <!-- Active poem - contribution form -->
    <template x-if="!loading && !error && !justContributed && !isLastContributor && poem && poem.status === 'in_progress'">
      <div>
        <div class="panel" style="margin-bottom: 1.5rem;">
          <h2 x-text="formDisplayName"></h2>
          <p style="font-size: 0.85rem; color: var(--color-text-light);">
            Line <span x-text="currentLineNumber"></span> of 
            <span x-text="poem.total_lines"></span>
            &nbsp; · &nbsp;
            <a :href="glossaryUrl(formDisplayName)" 
               style="font-size: 0.85rem; color: var(--color-text-light);">
              about this form →
              </a>
          </p>
          <p style="font-size: 0.85rem; color: var(--color-text-light); margin-top: 0.25rem;"
             x-text="poem.visibility === 'public' 
               ? 'Public · listed on Join a Gang (Poem)' 
               : 'Invite-only · share this URL to invite contributors'">
          </p>
        </div>
        <div class="panel poem-form">
          <template x-for="(line, index) in lines" :key="line.line_number">
            <div>
              <!-- Stanza break -->
              <template x-if="needsStanzaBreak(index)">
                <hr class="stanza-break">
              </template>

              <div class="line-group">
                <div class="line-label">
                  <span>
                    <strong>Line <span x-text="line.line_number"></span></strong>
                    <template x-if="line.syllable_count_expected">
                      <span>&nbsp; · &nbsp;<span x-text="line.syllable_count_expected"></span> syllables</span>
                    </template>
                    <template x-if="line.syllable_min && line.syllable_max">
                      <span>&nbsp; · &nbsp;<span x-text="line.syllable_min"></span>–<span x-text="line.syllable_max"></span> syllables</span>
                    </template>
                    <template x-if="getScansionGuide(line.foot_type, line.feet_count)">
                      <span>&nbsp; · &nbsp;<span x-text="getScansionGuide(line.foot_type, line.feet_count)"></span></span>
                    </template>
                    <span>&nbsp; · &nbsp;<span x-text="getRhymeHint(line, lines)"></span></span>
                  </span>
                </div>
                <!-- Locked line (previous lines) -->
                <template x-if="line.is_locked">
                  <input
                    type="text"
                    class="line-input locked"
                    :value="obscureLine(line.content)"
                    disabled>
                </template>

                <!-- Current editable line -->
                <template x-if="!line.is_locked && line.line_number === currentLineNumber">
                  <div>
                    <input
                      type="text"
                      class="line-input"
                      x-model="currentContent"
                      @input="validateLine()"
                      :placeholder="`Enter line ${line.line_number}...`"
                      autofocus>
                    
                    <!-- Syllable feedback -->
                    <template x-if="syllableWarning">
                      <p class="line-warning" x-text="syllableWarning"></p>
                    </template>
                    <template x-if="syllableOk && currentContent.trim()">
                      <p class="line-ok">✓ Syllable count looks good!</p>
                    </template>

                    <!-- Rhyme feedback -->
                    <template x-if="rhymeWarning">
                      <p class="line-warning" x-text="rhymeWarning"></p>
                    </template>

                    <!-- Inline save button -->
                    <div style="text-align: right; margin-top: 0.5rem;">
                      <button
                        class="btn-secondary"
                        @click="saveLine()"
                        :disabled="saving || !currentContent.trim()"
                        x-text="saving ? 'Saving...' : 'Save'">
                      </button>
                    </div>
                  </div>
                </template>


                <!-- Future lines (not yet reached) -->
                <template x-if="!line.is_locked && line.line_number !== currentLineNumber">
                  <input
                    type="text"
                    class="line-input"
                    disabled
                    placeholder="———">
                </template>
              </div>
            </div>
          </template>

          <!-- Save button -->
          <div style="text-align: center; margin-top: var(--spacing-md);">
            <button
              class="btn-primary"
              @click="saveLine()"
              :disabled="saving || !currentContent.trim()"
              x-text="saving ? 'Saving...' : 'Save your line →'">
            </button>
          </div>

        </div>
      </div>
    </template>

  </main>

  <footer>
    <div class="container">
      <p>Gang poetry is a collaborative form. Each contributor adds one line without seeing the others.</p>
    </div>
  </footer>

  <script>
    function app() {
      return {
        loading: true,
        error: null,
        poem: null,
        lines: [],
        form: null,
        formDisplayName: '',
        currentLineNumber: null,
        currentContent: '',
        syllableWarning: null,
        syllableOk: false,
        rhymeWarning: null,
        isLastContributor: false,
        lastContributedAt: '',
        justContributed: false,
        justContributedLine: null,
        saving: false,
        stanzas: [],
        raceConditionWarning: false,
        pollInterval: null,
        likeCount: 0,
        userHasLiked: false,
        userHasReported: false,
        reportReason: '',
        showReportForm: false,
        sharing: false,

        async init() {
          const params = new URLSearchParams(window.location.search);
          const slug = params.get('id');

          if (!slug) {
            this.error = 'No poem found. Please check your URL.';
            this.loading = false;
            return;
          }

          refreshCookie();
          await this.loadPoem(slug);
          this.loading = false;
          this.startPolling();
          // Warn if leaving without contributing line 1
          window.addEventListener('beforeunload', (e) => {
            if (this.poem?.status === 'in_progress' && 
                this.currentLineNumber === 1 && 
                !this.justContributed) {
              e.preventDefault();
              e.returnValue = '';
            }
          });
        },

        async loadPoem(slug) {
          // Load poem
          const { data: poem, error } = await supabaseClient
            .from('gp_poems')
            .select('*, gp_forms(name, variant)')
            .eq('slug', slug)
            .gt('total_lines', 0)
            .maybeSingle();

          if (error || !poem) {
            this.error = 'Poem not found. Please check your URL.';
            return;
          }

          this.poem = poem;
          this.form = poem.gp_forms;
          this.formDisplayName = poem.gp_forms.name +
            (poem.gp_forms.variant
              ? ' (' + poem.gp_forms.variant.charAt(0).toUpperCase() +
                poem.gp_forms.variant.slice(1) + ')'
              : '');

          // Load lines
          const { data: lines } = await supabaseClient
            .from('gp_lines')
            .select('*')
            .eq('poem_id', poem.id)
            .order('line_number')
            .gt('line_number', 0);

          if (!lines) return;
          this.lines = lines;

          if (poem.status === 'complete') {
            this.buildStanzas();
            await this.loadLikes();
            await this.checkReported();
            return;
          }

          // Find current line (first unlocked)
          const currentLine = lines.find(l => !l.is_locked);
          if (currentLine) {
            this.currentLineNumber = currentLine.line_number;
          }

          // Check if current user was last contributor
          const cookieId = getCookieId();
          const lastLocked = [...lines]
            .reverse()
            .find(l => l.is_locked);

          if (lastLocked && lastLocked.contributor_cookie === cookieId) {
            this.isLastContributor = true;
            this.lastContributedAt = new Date(lastLocked.contributed_at)
              .toLocaleString();
          }
        },

        buildStanzas() {
          if (!this.form || !this.poem.stanza_count) {
            this.stanzas = [this.lines];
            return;
          }
          const linesPerStanza = this.poem.total_lines / this.poem.stanza_count;
          const stanzas = [];
          for (let i = 0; i < this.poem.stanza_count; i++) {
            stanzas.push(
              this.lines.slice(i * linesPerStanza, (i + 1) * linesPerStanza)
            );
          }
          this.stanzas = stanzas;
        },

        needsStanzaBreak(index) {
          if (!this.poem?.stanza_count || this.poem.stanza_count <= 1) return false;
          const linesPerStanza = this.poem.total_lines / this.poem.stanza_count;
          return index > 0 && index % linesPerStanza === 0;
        },

        obscureLine(content) {
          if (!content) return '';
          return content.replace(/[a-zA-Z]/g, '·');
        },
        async validateLine() {
          const line = this.lines.find(l => l.line_number === this.currentLineNumber);
          if (!line || !this.currentContent.trim()) {
            this.syllableWarning = null;
            this.syllableOk = false;
            this.rhymeWarning = null;
            return;
          }

          // Syllable check
          const sylCheck = checkSyllables(
            this.currentContent,
            line.syllable_count_expected,
            line.syllable_min,
            line.syllable_max
          );
          this.syllableWarning = sylCheck.ok ? null : sylCheck.message;
          this.syllableOk = sylCheck.ok;

          // Rhyme check
          if (line.rhyme_group && line.rhyme_phonemes && !line.is_rhyme_determining) {
            const rhymeCheck = await checkRhymes(
              this.currentContent,
              line.rhyme_phonemes
            );
            this.rhymeWarning = rhymeCheck.ok ? null : rhymeCheck.message;
          }
        },

        async saveLine() {
          if (!this.currentContent.trim() || this.saving) return;
          this.saving = true;

          // Check line is still available before saving
          const { data: freshLine } = await supabaseClient
                    .from('gp_lines')
            .select('is_locked, contributor_cookie')
            .eq('id', this.lines.find(l => 
              l.line_number === this.currentLineNumber).id)
            .single();
          if (freshLine?.is_locked) {
            this.saving = false;
            await this.loadPoem(this.poem.slug);
            // If poem is now complete, just show the reveal
            if (this.poem?.status === 'complete') return;
            // Otherwise show the warning
            this.raceConditionWarning = true;
            return;
          } 

          const cookieId = getCookieId();
          const line = this.lines.find(l => l.line_number === this.currentLineNumber);
          if (!line) return;

          // Get rhyme signature if this is a rhyme-determining line
          let rhymePhonemes = null;
          if (line.is_rhyme_determining) {
            rhymePhonemes = await getRhymeSignature(this.currentContent);
          }

          // Update this line
          const { error: lineError } = await supabaseClient
            .from('gp_lines')
            .update({
              content: this.currentContent.trim(),
              contributor_cookie: cookieId,
              rhyme_phonemes: rhymePhonemes,
              syllable_count_actual: countLineSyllables(this.currentContent),
              is_locked: true,
              contributed_at: new Date().toISOString()
            })
            .eq('id', line.id);

          if (lineError) {
            this.error = 'Something went wrong saving your line. Please try again.';
            this.saving = false;
            return;
          }

          // If rhyme-determining, propagate rhyme hint to sibling lines
          if (line.is_rhyme_determining && rhymePhonemes) {
            await this.propagateRhyme(line, rhymePhonemes);
          }

          // If this is line 1, set the title now
          if (this.currentLineNumber === 1) {
            await supabaseClient
              .from('gp_poems')
              .update({ title: this.currentContent.trim() })
              .eq('id', this.poem.id);
          }

          // Check if this was the last line
          const isLastLine = this.currentLineNumber === this.poem.total_lines;

          if (isLastLine) {
            await this.completePoem();
            // Reload to show the completed poem reveal
            await this.loadPoem(this.poem.slug);
            return;
          } else {
            // Update last_touched on poem
            await supabaseClient
              .from('gp_poems')
              .update({ last_touched: new Date().toISOString() })
              .eq('id', this.poem.id);
          }

          this.justContributed = true;
          this.justContributedLine = this.currentLineNumber;
          this.saving = false;
        },

        async propagateRhyme(determiningLine, rhymePhonemes) {
          // Find all lines in this poem with the same rhyme_group
          // that aren't yet locked and aren't the determining line
          const siblingLines = this.lines.filter(l =>
            l.rhyme_group === determiningLine.rhyme_group &&
            l.line_number !== determiningLine.line_number &&
            !l.is_locked
          );

          if (!siblingLines.length) return;

          const ids = siblingLines.map(l => l.id);
          await supabaseClient
            .from('gp_lines')
            .update({ rhyme_phonemes: rhymePhonemes })
            .in('id', ids);
        },

async completePoem() {
  const { data: firstLine } = await supabaseClient
    .from('gp_lines')
    .select('content')
    .eq('poem_id', this.poem.id)
    .eq('line_number', 1)
    .gt('line_number', 0)  // cache buster
    .single();

  const title = firstLine?.content?.trim() || 'Untitled';

  const { error } = await supabaseClient
    .from('gp_poems')
    .update({
      status: 'complete',
      completed_at: new Date().toISOString(),
      title,
      last_touched: new Date().toISOString()
    })
    .eq('id', this.poem.id);

  if (error) {
    console.error('completePoem error:', error);
  }
},

async loadLikes() {
  const cookieId = getCookieId();
  if (!this.poem) return;

  const { count } = await supabaseClient
    .from('gp_likes')
    .select('*', { count: 'exact', head: true })
    .eq('poem_id', this.poem.id);

  this.likeCount = count || 0;

  if (cookieId) {
    const { data } = await supabaseClient
      .from('gp_likes')
      .select('poem_id')
      .eq('poem_id', this.poem.id)
      .eq('liker_cookie', cookieId)
      .maybeSingle();
    this.userHasLiked = !!data;
  }
},

async toggleLike() {
  const cookieId = getCookieId();
  if (!cookieId || !this.poem) return;

  if (this.userHasLiked) {
    await supabaseClient
      .from('gp_likes')
      .delete()
      .eq('poem_id', this.poem.id)
      .eq('liker_cookie', cookieId);
    this.likeCount--;
    this.userHasLiked = false;
  } else {
    await supabaseClient
      .from('gp_likes')
      .insert({
        poem_id: this.poem.id,
        liker_cookie: cookieId
      });
    this.likeCount++;
    this.userHasLiked = true;
  }
},

async checkReported() {
  const cookieId = getCookieId();
  if (!cookieId || !this.poem) return;

  const { data } = await supabaseClient
    .from('gp_reports')
    .select('id')
    .eq('poem_id', this.poem.id)
    .eq('reporter_cookie', cookieId)
    .maybeSingle();

  this.userHasReported = !!data;
},

async submitReport() {
  const cookieId = getCookieId();
  if (!cookieId || !this.poem || this.userHasReported) return;

  // Check daily limit (5 reports per cookie per day)
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const { count } = await supabaseClient
    .from('gp_reports')
    .select('*', { count: 'exact', head: true })
    .eq('reporter_cookie', cookieId)
    .gte('created_at', today.toISOString());

  if (count >= 5) {
    alert('You\'ve reached the maximum number of reports for today. Thank you for helping keep this space safe.');
    this.showReportForm = false;
    return;
  }

  const { error } = await supabaseClient
    .from('gp_reports')
    .insert({
      poem_id: this.poem.id,
      reporter_cookie: cookieId,
      reason: this.reportReason.trim() || null
    });

  if (!error) {
    this.userHasReported = true;
    this.showReportForm = false;
    this.reportReason = '';

    // Check if poem should be auto-flagged
    const { count: reportCount } = await supabaseClient
      .from('gp_reports')
      .select('*', { count: 'exact', head: true })
      .eq('poem_id', this.poem.id);

    if (reportCount >= 5) {
      await supabaseClient
        .from('gp_poems')
        .update({ flagged: true })
        .eq('id', this.poem.id)
        .eq('reviewed', false);
    }
  }
},

async sharePoem() {
  const url = window.location.href;
  const title = this.poem.title;
  const text = this.lines.map(l => l.content).join('\n');

  if (navigator.share) {
    try {
      await navigator.share({ title, text, url });
    } catch (err) {
      if (err.name !== 'AbortError') {
        navigator.clipboard.writeText(url)
          .then(() => alert('URL copied!'));
      }
    }
  } else {
    navigator.clipboard.writeText(url)
      .then(() => alert('URL copied!'));
  }
},

startPolling() {
  this.pollInterval = setInterval(async () => {
    if (document.hidden) return;
    if (this.poem?.status === 'complete') {
      clearInterval(this.pollInterval);
      return;
    }
    if (this.justContributed) return;
    const slug = new URLSearchParams(window.location.search).get('id');
    if (slug) await this.loadPoem(slug);
  }, 15000);
},

stopPolling() {
  if (this.pollInterval) clearInterval(this.pollInterval);
},      
        copyUrl() {
          navigator.clipboard.writeText(window.location.origin + 
            window.location.pathname.replace('poem.html', '') + 
            poemUrl(this.poem.slug))
            .then(() => alert('URL copied!'));
        }
      }
    }
  </script>

</body>
</html>
