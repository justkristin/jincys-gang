<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Browse Completed Poems · Gang Poetry</title>
  <link rel="icon" href="https://hyde.flaneurpajamas.com/commonplaces/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/cookies.js"></script>
  <script src="js/utils.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <header>
    <div class="container">
      <div class="header-inner">
        <img class="header-favicon" ...>
        <div class="header-text">
          <h1><a href="index.html">Gang Poetry</a></h1>
          <p class="tagline">A collaborative poetry experiment</p>
        </div>
        <nav class="header-nav">
          <a href="index.html">Home</a>
          <a href="mypoems.html">My Poems</a>
          <a href="browse.html">Completed</a>
          <a href="public.html">Join a Gang</a>
          <a href="glossary.html">Glossary</a>
          <a href="faq.html">FAQ</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="container">

    <h2 style="margin-bottom: 1rem;">Completed Poems</h2>

    <!-- Filters -->
    <div class="panel" style="margin-bottom: 1.5rem;">
      <div class="browse-controls">
        <input
          type="text"
          class="line-input"
          placeholder="Search titles..."
          x-model="searchTerm"
          @input.debounce.400ms="resetAndLoad()">

        <select class="line-input" x-model="formFilter" @change="resetAndLoad()">
          <option value="">All forms</option>
          <template x-for="form in forms" :key="form.id">
            <option :value="form.id" x-text="form.name + (form.variant ? ' (' + form.variant + ')' : '')"></option>
          </template>
        </select>
      </div>
    </div>

    <!-- Loading -->
    <template x-if="loading">
      <p>Loading poems...</p>
    </template>

    <!-- No results -->
    <template x-if="!loading && poems.length === 0">
      <div class="panel" style="text-align: center;">
        <p>No completed poems found<span x-show="searchTerm || formFilter"> matching your filters</span>.</p>
        <p><a href="index.html">← Back to home</a></p>
      </div>
    </template>

    <!-- Poem list -->
    <template x-if="!loading && poems.length > 0">
      <div>
        <ul class="poem-list">
          <template x-for="poem in poems" :key="poem.id">
            <li class="poem-list-item">
              <a :href="poemUrl(poem.slug)" x-text="poem.title"></a>
              <div class="poem-meta">
                <span x-text="poem.gp_forms.name + (poem.gp_forms.variant ? ' (' + poem.gp_forms.variant + ')' : '')"></span>
                <span class="meta-divider">·</span>
                <span x-text="formatDate(poem.completed_at)"></span>
              </div>
            </li>
          </template>
        </ul>

        <!-- Pagination -->
        <div class="pagination">
          <button
            class="btn-secondary"
            @click="prevPage()"
            :disabled="page === 0">
            ← Previous
          </button>
          <span class="page-info" x-text="`Page ${page + 1}`"></span>
          <button
            class="btn-secondary"
            @click="nextPage()"
            :disabled="!hasMore">
            Next →
          </button>
        </div>
      </div>
    </template>

    <p style="margin-top: 1.5rem;"><a href="index.html">← Back to home</a></p>

  </main>

  <footer>
    <div class="container">
      <p>Gang poetry is a collaborative form. Each contributor adds one line without seeing the others.</p>
    </div>
  </footer>

  <script>
    const PAGE_SIZE = 20;

    function app() {
      return {
        loading: true,
        poems: [],
        forms: [],
        searchTerm: '',
        formFilter: '',
        page: 0,
        hasMore: false,
        pollInterval: null,

        async init() {
          await this.loadForms();
          await this.loadPoems();
          this.loading = false;
          this.startPolling();
        },

        async loadForms() {
          const { data } = await supabaseClient
            .from('gp_forms')
            .select('id, name, variant')
            .eq('is_public', true)
            .order('name');
          this.forms = data || [];
        },

        async resetAndLoad() {
          this.page = 0;
          await this.loadPoems();
        },

        async loadPoems() {
          this.loading = true;

          let query = supabaseClient
            .from('gp_poems')
            .select('id, slug, title, completed_at, gp_forms(name, variant)')
            .eq('status', 'complete')
            .gt('completed_at', '2000-01-01')    // ← cache buster
            .order('completed_at', { ascending: false })
            .range(this.page * PAGE_SIZE, (this.page * PAGE_SIZE) + PAGE_SIZE);

          if (this.formFilter) {
            query = query.eq('form_id', this.formFilter);
          }

          if (this.searchTerm.trim()) {
            query = query.ilike('title', `%${this.searchTerm.trim()}%`);
          }

          const { data, error } = await query;

          if (error) {
            console.error('Error loading poems:', error);
            this.poems = [];
            this.loading = false;
            return;
          }

          // We fetched one extra to check if there's a next page
          this.hasMore = data.length > PAGE_SIZE;
          this.poems = data.slice(0, PAGE_SIZE);
          this.loading = false;
        },

        async nextPage() {
          if (!this.hasMore) return;
          this.page++;
          await this.loadPoems();
        },

        async prevPage() {
          if (this.page === 0) return;
          this.page--;
          await this.loadPoems();
        },

        formatDate(dateStr) {
          if (!dateStr) return '';
          return new Date(dateStr).toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric'
          });
        },

        startPolling() {
          this.pollInterval = setInterval(async () => {
            if (document.hidden) return;
            await this.loadPoems();
          }, 60000);
        },

        stopPolling() {
          if (this.pollInterval) clearInterval(this.pollInterval);
        },
      }
    }
  </script>

</body>
</html>
